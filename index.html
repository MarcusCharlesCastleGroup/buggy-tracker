<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0c12"/>
  <title>Jetquay Fleet Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0c12;
      --panel: rgba(20, 24, 35, 0.88);
      --panel-solid: #141823;
      --border: rgba(74, 222, 128, 0.12);
      --border-soft: rgba(255, 255, 255, 0.06);
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.55);
      --green-glow: rgba(74, 222, 128, 0.35);
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e8eaf0;
      --text-dim: #9ca3af;
      --text-faint: #5b6372;
      --display: 'Space Grotesk', 'Segoe UI', sans-serif;
      --mono: 'IBM Plex Mono', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--display);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient glow backdrop behind everything */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 0%, rgba(74,222,128,0.06), transparent 60%),
        radial-gradient(ellipse 50% 35% at 90% 100%, rgba(56,189,248,0.05), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============ HEADER ============ */
    header {
      position: relative;
      z-index: 5;
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(74,222,128,0.08), 0 8px 24px rgba(0,0,0,0.45);
      animation: slideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      text-transform: uppercase;
    }
    .logo span {
      color: var(--green);
      text-shadow: 0 0 12px var(--green-glow), 0 0 32px rgba(74,222,128,0.2);
    }
    .logo .sub {
      color: var(--text-faint);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      margin-left: 8px;
      text-shadow: none;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 42, 26, 0.8);
      border: 1px solid var(--green-dim);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10px;
      color: var(--green);
      font-weight: 700;
      letter-spacing: 0.14em;
      box-shadow: 0 0 14px rgba(74,222,128,0.18), inset 0 0 8px rgba(74,222,128,0.08);
    }

    /* Radar-ping live dot */
    .live-dot {
      position: relative;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }
    .live-dot::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 1px solid var(--green);
      animation: ping 1.8s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      0%   { transform: scale(1); opacity: 0.9; }
      80%, 100% { transform: scale(3.2); opacity: 0; }
    }

    .header-right { display: flex; align-items: center; gap: 14px; font-size: 11px; }
    .last-ok { color: var(--text-faint); font-family: var(--mono); font-size: 10px; }
    #last-update { color: var(--text-dim); }
    .flash { animation: flashGreen 0.9s ease; }
    @keyframes flashGreen {
      0%  { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }
      100%{ color: var(--text-dim); text-shadow: none; }
    }

    /* Countdown ring */
    .ring-box { position: relative; width: 34px; height: 34px; filter: drop-shadow(0 0 6px rgba(74,222,128,0.3)); }
    .ring-box svg { transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: #2a2d3a; stroke-width: 3; }
    .ring-fill {
      fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 88; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .ring-label {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 10px; font-weight: 600; color: var(--green);
    }

    /* ============ LAYOUT ============ */
    .main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

    /* ============ SIDEBAR ============ */
    .sidebar {
      width: 212px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      animation: slideRight 0.6s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes slideRight {
      from { transform: translateX(-100%); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .sidebar-header {
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-header::after {
      content: '';
      width: 24px; height: 2px;
      background: linear-gradient(90deg, var(--green), transparent);
      border-radius: 2px;
    }

    .vehicle-list { flex: 1; overflow-y: auto; overscroll-behavior: contain; }
    .vehicle-list::-webkit-scrollbar { width: 5px; }
    .vehicle-list::-webkit-scrollbar-track { background: transparent; }
    .vehicle-list::-webkit-scrollbar-thumb { background: rgba(74,222,128,0.18); border-radius: 4px; }
    .vehicle-list::-webkit-scrollbar-thumb:hover { background: rgba(74,222,128,0.35); }

    .v-item {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border-soft);
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .v-item:hover {
      background: rgba(74,222,128,0.05);
      transform: translateX(2px);
    }
    .v-item.selected {
      background: linear-gradient(90deg, rgba(74,222,128,0.12), rgba(74,222,128,0.02));
      border-left-color: var(--green);
      box-shadow: inset 0 0 18px rgba(74,222,128,0.06);
    }
    .v-item.selected .v-name { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }

    /* staggered entrance on first load */
    .v-item.animate-in { animation: itemIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes itemIn {
      from { opacity: 0; transform: translateX(-14px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .v-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #0a0c12;
      flex-shrink: 0;
      box-shadow: 0 0 10px -1px currentColor, inset 0 -2px 4px rgba(0,0,0,0.25);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .v-item:hover .v-icon { transform: scale(1.12); }

    .v-info { flex: 1; min-width: 0; }
    .v-name { font-size: 12.5px; font-weight: 600; color: var(--text); transition: color 0.2s; }
    .v-time { font-size: 10px; margin-top: 2px; font-family: var(--mono); display: flex; align-items: center; gap: 5px; }
    .v-time::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; box-shadow: 0 0 6px currentColor; }
    .fresh { color: var(--green); }
    .stale { color: var(--amber); }
    .old { color: var(--red); }

    .stats-bar {
      padding: 10px 14px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      flex-shrink: 0;
      background: rgba(10, 12, 18, 0.5);
    }
    .stat { text-align: center; }
    .stat-val {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 600;
      color: var(--green);
      text-shadow: 0 0 14px var(--green-glow);
      transition: transform 0.2s;
    }
    .stat-label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.16em; margin-top: 1px; }

    /* ============ MAP ============ */
    .map-wrap { flex: 1; position: relative; min-width: 0; min-height: 0; }
    #map { position: absolute; inset: 0; }

    /* Vignette so the satellite imagery blends into the dark UI */
    .map-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 70px 18px rgba(8, 10, 16, 0.65);
      z-index: 2;
    }

    /* Dark Google InfoWindow */
    .gm-style .gm-style-iw-c {
      background: var(--panel-solid) !important;
      border: 1px solid var(--border);
      border-radius: 10px !important;
      box-shadow: 0 0 24px rgba(74,222,128,0.15), 0 10px 30px rgba(0,0,0,0.6) !important;
      padding: 0 !important;
    }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style .gm-style-iw-tc::after { background: var(--panel-solid) !important; }
    .gm-style .gm-style-iw-c button[title="Close"] span { background-color: var(--text-dim) !important; }

    .info-box { background: transparent; padding: 10px 14px; font-size: 12px; min-width: 130px; font-family: var(--display); }
    .info-box strong {
      color: var(--green);
      font-size: 13px;
      display: block;
      margin-bottom: 3px;
      letter-spacing: 0.03em;
      text-shadow: 0 0 10px var(--green-glow);
    }
    .info-box span { color: var(--text-dim); display: block; font-family: var(--mono); font-size: 10.5px; }

    /* ============ MOBILE TOGGLE HANDLE ============ */
    .sheet-handle { display: none; }

    /* ============ MOBILE (≤768px) ============ */
    @media (max-width: 768px) {
      .main { flex-direction: column; }

      .logo { font-size: 14px; }
      .logo .sub { display: none; }
      header { padding: 8px 12px; padding-top: max(8px, env(safe-area-inset-top)); }
      .last-ok { display: none; }

      .map-wrap { order: 1; flex: 1; }

      /* Sidebar becomes a bottom sheet */
      .sidebar {
        order: 2;
        width: 100%;
        border-right: none;
        border-top: 1px solid var(--border);
        box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        animation: slideUp 0.6s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
        max-height: 34vh;
        transition: max-height 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
      }
      .sidebar.expanded { max-height: 62vh; }

      .sheet-handle {
        display: flex;
        justify-content: center;
        padding: 7px 0 3px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .sheet-handle::before {
        content: '';
        width: 38px; height: 4px;
        border-radius: 4px;
        background: rgba(255,255,255,0.18);
        transition: background 0.2s;
      }
      .sheet-handle:active::before { background: var(--green-dim); }

      .sidebar-header { padding: 4px 14px 8px; }

      .v-item { padding: 11px 14px; }
      .v-icon { width: 32px; height: 32px; font-size: 11px; }
      .v-name { font-size: 13.5px; }
      .v-time { font-size: 11px; }

      .stats-bar { grid-template-columns: 1fr 1fr; padding: 8px 14px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
      .stat-val { font-size: 17px; }
    }

    /* Very small phones */
    @media (max-width: 380px) {
      .live-badge { padding: 3px 8px; font-size: 9px; }
      .ring-box { width: 30px; height: 30px; }
    }

    /* Respect reduced-motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">JET<span>QUAY</span><span class="sub">Fleet Tracker</span></div>
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  </div>
  <div class="header-right">
    <div class="last-ok">SYNC <span id="last-update">—</span></div>
    <div class="ring-box">
      <svg width="34" height="34" viewBox="0 0 32 32">
        <circle class="ring-track" cx="16" cy="16" r="14"/>
        <circle class="ring-fill" id="ring" cx="16" cy="16" r="14"/>
      </svg>
      <div class="ring-label" id="ring-label">30</div>
    </div>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sheet-handle" id="sheet-handle" aria-label="Expand vehicle list" role="button" tabindex="0"></div>
    <div class="sidebar-header">Fleet</div>
    <div class="vehicle-list" id="vehicle-list"></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-val" id="stat-fresh">0</div><div class="stat-label">Fresh</div></div>
    </div>
  </div>
  <div class="map-wrap"><div id="map"></div></div>
</div>

<script>
const COLORS = {
  Buggy_2:'#4ade80', Buggy_7:'#60a5fa', Buggy_4:'#f472b6',
  Buggy_5:'#fb923c', Buggy_6:'#a78bfa', Buggy_8:'#34d399',
  Buggy_9:'#fbbf24', Buggy_10:'#f87171', Buggy_11:'#38bdf8',
  Hiace_4:'#e879f9', Mercedes:'#94a3b8', Vellfire:'#f43f5e'
};
const ORDER = ['Buggy_2','Buggy_7','Buggy_4','Buggy_5','Buggy_6','Buggy_8','Buggy_9','Buggy_10','Buggy_11','Hiace_4','Mercedes','Vellfire'];
const POLL = 30, CIRC = 88;
let map, markers = {}, infoWindows = {}, buggies = {}, countdown = POLL;
let firstRender = true;
let selectedId = null;

// Mobile bottom-sheet toggle
const sidebar = document.getElementById('sidebar');
const handle = document.getElementById('sheet-handle');
handle.addEventListener('click', () => sidebar.classList.toggle('expanded'));
handle.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') sidebar.classList.toggle('expanded'); });

// Countdown ring
const ring = document.getElementById('ring');
const ringLabel = document.getElementById('ring-label');
setInterval(() => {
  countdown = Math.max(0, countdown - 1);
  ring.style.strokeDashoffset = CIRC * (1 - countdown / POLL);
  const c = countdown <= 5 ? '#f59e0b' : '#4ade80';
  ring.style.stroke = c; ringLabel.style.color = c; ringLabel.textContent = countdown;
}, 1000);

function onSync() {
  countdown = POLL; ring.style.strokeDashoffset = 0;
  const el = document.getElementById('last-update');
  el.textContent = new Date().toLocaleTimeString();
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

function timeAgo(iso) {
  const s = Math.max(0, (Date.now() - new Date(iso)) / 1000);
  if (s < 60) return Math.round(s) + 's ago';
  if (s < 3600) return Math.round(s/60) + 'm ago';
  return Math.round(s/3600) + 'h ago';
}
function freshClass(iso) {
  const s = Math.max(0, (Date.now() - new Date(iso)) / 1000);
  if (s < 1800) return 'fresh'; if (s < 7200) return 'stale'; return 'old';
}
function getLabel(id) {
  if (id.startsWith('Buggy_')) return 'Buggy ' + id.replace('Buggy_', '');
  return id.replace(/_/g, ' ');
}
function getPinText(id) {
  if (id.startsWith('Buggy_')) return id.replace('Buggy_', '');
  return id.replace(/_/g, '').substring(0, 2).toUpperCase();
}
function spreadOverlaps(positions) {
  const THRESH = 0.00008, SPREAD = 0.00013, adj = {}, used = new Set();
  const ids = Object.keys(positions);
  ids.forEach(id => {
    if (used.has(id)) return;
    const grp = [id]; used.add(id);
    ids.forEach(o => {
      if (used.has(o)) return;
      const dl = positions[id].lat - positions[o].lat;
      const dn = positions[id].lng - positions[o].lng;
      if (Math.sqrt(dl*dl + dn*dn) < THRESH) { grp.push(o); used.add(o); }
    });
    if (grp.length === 1) { adj[id] = {...positions[id]}; }
    else { grp.forEach((gid, i) => { const a = (2*Math.PI*i)/grp.length; adj[gid] = { lat: positions[id].lat + SPREAD*Math.cos(a), lng: positions[id].lng + SPREAD*Math.sin(a) }; }); }
  });
  return adj;
}

// Glowing pin with soft halo
function makePinSVG(color, text) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="38" height="44" viewBox="0 0 38 44">
    <defs>
      <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="${color}" flood-opacity="0.8"/>
      </filter>
    </defs>
    <g filter="url(#g)">
      <path d="M19 2C11.27 2 5 8.27 5 16C5 25 19 40 19 40C19 40 33 25 33 16C33 8.27 26.73 2 19 2Z" fill="${color}" stroke="rgba(0,0,0,0.35)" stroke-width="1"/>
      <circle cx="19" cy="15" r="9" fill="rgba(0,0,0,0.28)"/>
      <text x="19" y="19.5" text-anchor="middle" font-family="'Space Grotesk','Segoe UI',sans-serif" font-size="10" font-weight="700" fill="white">${text}</text>
    </g>
  </svg>`;
}

function selectVehicle(id) {
  selectedId = id;
  document.querySelectorAll('.v-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('selected');
}

function updateAll(data) {
  buggies = data;
  if (!map) { window._pendingData = data; return; }

  const rawPos = {};
  Object.keys(data).forEach(id => { rawPos[id] = { lat: data[id].lat, lng: data[id].lng }; });
  const adj = spreadOverlaps(rawPos);

  const list = document.getElementById('vehicle-list');
  list.innerHTML = '';
  let freshCount = 0;

  const sorted = ORDER.filter(id => data[id]).concat(
    Object.keys(data).filter(id => !ORDER.includes(id)).sort()
  );

  sorted.forEach((id, idx) => {
    const b = data[id];
    const color = COLORS[id] || '#4ade80';
    const pos = adj[id] || { lat: b.lat, lng: b.lng };
    const label = getLabel(id);
    const pinText = getPinText(id);
    const fc = freshClass(b.updated_at || b.timestamp);
    const ago = timeAgo(b.updated_at || b.timestamp);
    if (fc === 'fresh') freshCount++;

    // Sidebar item
    const item = document.createElement('div');
    item.className = 'v-item' + (firstRender ? ' animate-in' : '') + (id === selectedId ? ' selected' : '');
    if (firstRender) item.style.animationDelay = (idx * 45) + 'ms';
    item.id = 'item-' + id;
    item.innerHTML = `<div class="v-icon" style="background:${color}; color:${color}"><span style="color:#0a0c12">${pinText}</span></div>
      <div class="v-info">
        <div class="v-name">${label}</div>
        <div class="v-time ${fc}">${ago}</div>
      </div>`;
    item.onclick = () => {
      map.panTo({ lat: pos.lat, lng: pos.lng });
      map.setZoom(19);
      Object.values(infoWindows).forEach(w => w.close());
      if (infoWindows[id]) infoWindows[id].open(map, markers[id]);
      selectVehicle(id);
      // collapse the sheet on mobile so the map is visible
      if (window.innerWidth <= 768) sidebar.classList.remove('expanded');
    };
    list.appendChild(item);

    // Marker
    const svgUrl = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(makePinSVG(color, pinText));
    const icon = { url: svgUrl, scaledSize: new google.maps.Size(36, 42), anchor: new google.maps.Point(18, 40) };
    const popupContent = `<div class="info-box"><strong>${label}</strong><span>${ago}</span></div>`;

    if (markers[id]) {
      markers[id].setPosition({ lat: pos.lat, lng: pos.lng });
      markers[id].setIcon(icon);
      infoWindows[id].setContent(popupContent);
    } else {
      markers[id] = new google.maps.Marker({
        position: { lat: pos.lat, lng: pos.lng },
        map, title: label, icon,
        animation: google.maps.Animation.DROP
      });
      infoWindows[id] = new google.maps.InfoWindow({ content: popupContent });
      markers[id].addListener('click', () => {
        Object.values(infoWindows).forEach(w => w.close());
        infoWindows[id].open(map, markers[id]);
        selectVehicle(id);
      });
    }
  });

  document.getElementById('stat-total').textContent = sorted.length;
  document.getElementById('stat-fresh').textContent = freshCount;
  firstRender = false;
  onSync();
}

setInterval(() => { if (Object.keys(buggies).length) updateAll(buggies); }, 30000);

window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 1.3515, lng: 103.9882 },
    zoom: 17,
    mapTypeId: 'satellite',
    streetViewControl: false,
    fullscreenControl: true,
    mapTypeControl: true,
    backgroundColor: '#0a0c12',
    gestureHandling: 'greedy'
  });
  if (window._pendingData) updateAll(window._pendingData);
};

function connectFB() {
  const dbRef = window._fbRef(window._fbDB, 'buggies');
  window._fbOn(dbRef, snap => { const d = snap.val(); if (d) updateAll(d); });
}
if (window._fbDB) connectFB();
else window.addEventListener('fb-ready', connectFB);
</script>
</body>
</html>
